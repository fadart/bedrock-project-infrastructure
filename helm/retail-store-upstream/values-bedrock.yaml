catalog:
  mysql:
    create: false
    endpoint: bedrock-mysql.cofu0wcick4o.us-east-1.rds.amazonaws.com
    database: retailstore
    secret:
      create: false
      name: catalog-db-secret
      username: admin

orders:
  postgresql:
    create: false
    database: retailstore
    endpoint:
      host: bedrock-postgres.cofu0wcick4o.us-east-1.rds.amazonaws.com
      port: "5432"
    secret:
      create: false
      name: orders-db-secret
      username: dbadmin
  rabbitmq:
    create: true

carts:
  persistence: dynamodb
  dynamodb:
    tableName: bedrock-retail-store
    createTable: false
    create: false

checkout:
  endpoints:
    orders: http://retail-store-orders:80

ui:
  endpoints:
    catalog: http://retail-store-catalog:80
    carts: http://retail-store-carts:80
    checkout: http://retail-store-checkout:80
    orders: http://retail-store-orders:80
    assets: http://retail-store-assets:80
