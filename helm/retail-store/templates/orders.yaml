apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: {{ .Values.namespace }}
  labels:
    app: orders
    project: karatu-2025-capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: public.ecr.aws/aws-containers/retail-store-sample-orders:0.8.3
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ .Values.orders.db.host }}:{{ .Values.orders.db.port }}/{{ .Values.orders.db.name }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.orders.db.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orders.db.passwordSecret }}
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: orders
  ports:
    - port: 80
      targetPort: 8080
