apiVersion: v1
kind: ServiceAccount
metadata:
  name: bedrock-dev-view
  namespace: retail-app
  labels:
    project: karatu-2025-capstone
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bedrock-dev-view-binding
  labels:
    project: karatu-2025-capstone
subjects:
- kind: User
  name: bedrock-dev-view
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
