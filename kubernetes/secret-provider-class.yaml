apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: bedrock-db-secrets
  namespace: retail-app
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "/bedrock/mysql/password"
        objectType: "ssmparameter"
        objectAlias: "mysql-password"
      - objectName: "/bedrock/postgres/password"
        objectType: "ssmparameter"
        objectAlias: "postgres-password"
  secretObjects:
    - secretName: catalog-db-secret
      type: Opaque
      data:
        - objectName: "mysql-password"
          key: password
    - secretName: orders-db-secret
      type: Opaque
      data:
        - objectName: "postgres-password"
          key: password
